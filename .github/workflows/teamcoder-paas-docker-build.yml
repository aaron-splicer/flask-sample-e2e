# TeamCoder Deploy — Build Docker image and push to ECR Public
# Pushed to user's repo as .github/workflows/teamcoder-paas-docker-build.yml
# Triggered manually (workflow_dispatch) when user clicks Deploy.
#
# No secrets needed — uses OIDC federation to assume AWS role for ECR push.
# Image name is obfuscated (tc-{hash of owner/repo/branch}) so repo name is not discoverable.
# ECR Public images are publicly pullable — no visibility issues.

name: TeamCoder Deploy

on:
  push:
    branches:
      - teamcoder-deploy-trigger
    paths:
      - .teamcoder/build-trigger.json
  workflow_dispatch:

env:
  # ECR_PUBLIC_REGISTRY + ECR_REPO defaults — used when .teamcoder/build-trigger.json
  # doesn't specify overrides. Teamcoder writes the file at deploy time and can
  # substitute per-team / per-context values (e.g. IT scratch → teamcoder-it,
  # premium team → their own registry) without editing this yaml.
  ECR_PUBLIC_REGISTRY: public.ecr.aws/m9s1b7x8
  ECR_REPO: teamcoder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # contents: write — needed so the post-push step can commit last-build.json
      # back to teamcoder-deploy-trigger (writing the ECR digest for redeploy to read).
      contents: write
      id-token: write

    steps:
      # First checkout: on teamcoder-deploy-trigger — the branch the workflow fired on.
      # We need this to read .teamcoder/build-trigger.json (which lives on this branch).
      - name: Checkout trigger branch (read config)
        uses: actions/checkout@v4

      # Read ALL config from build-trigger.json BEFORE re-checking-out to the source
      # branch — the second checkout wipes the working directory and the trigger
      # branch's .teamcoder/build-trigger.json goes with it.
      - name: Read build config from trigger json
        id: cfg
        run: |
          SOURCE_BRANCH=$(jq -r '.branch // empty' .teamcoder/build-trigger.json 2>/dev/null || true)
          if [ -z "$SOURCE_BRANCH" ]; then
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
          fi
          REGISTRY=$(jq -r '.imageRegistry // empty' .teamcoder/build-trigger.json 2>/dev/null || true)
          REPO=$(jq -r '.imageRepo // empty' .teamcoder/build-trigger.json 2>/dev/null || true)
          [ -z "$REGISTRY" ] && REGISTRY="${{ env.ECR_PUBLIC_REGISTRY }}"
          [ -z "$REPO" ] && REPO="${{ env.ECR_REPO }}"
          HASH=$(echo -n "${{ github.repository }}/${SOURCE_BRANCH}" | sha256sum | head -c 8)
          echo "branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "tag=tc-${HASH}" >> $GITHUB_OUTPUT
          echo "Source branch:    $SOURCE_BRANCH"
          echo "Target image path: $REGISTRY/$REPO"
          echo "Image tag:        tc-${HASH}"

      # Second checkout: the SOURCE branch — this is what we actually build. Without
      # this, we'd build teamcoder-deploy-trigger's code (which never has the user's
      # develop changes), so image content never reflects new commits and Sequence 4's
      # marker check always fails.
      - name: Checkout source branch (for build)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.cfg.outputs.branch }}
          clean: true

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
          elif [ -f ".teamcoder/Dockerfile" ]; then
            echo "dockerfile=.teamcoder/Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "::error::No Dockerfile found. Add a Dockerfile to your repo."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::663099330265:role/teamcoder-ecr-push
          aws-region: us-east-1

      - name: Log in to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.detect.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.repo }}:${{ steps.cfg.outputs.tag }}
            ${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.repo }}:${{ steps.cfg.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Publish the manifest digest so teamcoder's /api/deploy/redeploy can read it
      # directly from GitHub instead of ECR HEAD (which is served via CloudFront and
      # returns stale digests for a window after push — see planning task tracking
      # this ECR-consistency issue). docker/build-push-action exposes the digest
      # authoritatively via steps.build.outputs.digest.
      - name: Checkout trigger branch (for digest commit)
        uses: actions/checkout@v4
        with:
          ref: teamcoder-deploy-trigger
          clean: true
          path: __trigger

      - name: Publish digest to last-build.json
        working-directory: __trigger
        run: |
          mkdir -p .teamcoder
          cat > .teamcoder/last-build.json <<EOF
          {
            "image": "${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.repo }}:${{ steps.cfg.outputs.tag }}",
            "tag": "${{ steps.cfg.outputs.tag }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "branch": "${{ steps.cfg.outputs.branch }}",
            "sourceSha": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "teamcoder-connector[bot]"
          git config user.email "teamcoder-connector[bot]@users.noreply.github.com"
          git add .teamcoder/last-build.json
          git commit -m "teamcoder: publish digest ${{ steps.build.outputs.digest }}"
          # Push filter on the workflow is paths: [.teamcoder/build-trigger.json] — so
          # touching last-build.json here does NOT re-trigger this workflow.
          git push origin teamcoder-deploy-trigger
