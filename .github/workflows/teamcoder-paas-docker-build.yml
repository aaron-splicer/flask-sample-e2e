# TeamCoder Deploy — Build Docker image and push to ECR Public
# Pushed to user's repo as .github/workflows/teamcoder-paas-docker-build.yml
# Triggered manually (workflow_dispatch) when user clicks Deploy.
#
# No secrets needed — uses OIDC federation to assume AWS role for ECR push.
# Image name is obfuscated (tc-{hash of owner/repo/branch}) so repo name is not discoverable.
# ECR Public images are publicly pullable — no visibility issues.

name: TeamCoder Deploy

on:
  push:
    branches:
      - teamcoder-deploy-trigger
    paths:
      - .teamcoder/build-trigger.json
  workflow_dispatch:

env:
  # ECR_PUBLIC_REGISTRY + ECR_REPO defaults — used when .teamcoder/build-trigger.json
  # doesn't specify overrides. Teamcoder writes the file at deploy time and can
  # substitute per-team / per-context values (e.g. IT scratch → teamcoder-it,
  # premium team → their own registry) without editing this yaml.
  ECR_PUBLIC_REGISTRY: public.ecr.aws/m9s1b7x8
  ECR_REPO: teamcoder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          # Tag by the SOURCE branch (from build-trigger.json), NOT the trigger
          # branch (GITHUB_REF_NAME = teamcoder-deploy-trigger). Must match Java's
          # obfuscateImageName(owner/repo, deployBranch) — redeploy computes the
          # expected image path using the source branch, so the tags have to hash
          # the same inputs or ECR digest lookup 404s and Railway pulls stale.
          SOURCE_BRANCH=$(jq -r '.branch // empty' .teamcoder/build-trigger.json 2>/dev/null || true)
          if [ -z "$SOURCE_BRANCH" ]; then
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
          fi
          HASH=$(echo -n "${{ github.repository }}/${SOURCE_BRANCH}" | sha256sum | head -c 8)
          echo "tag=tc-${HASH}" >> $GITHUB_OUTPUT
          echo "Tagging image for source branch: $SOURCE_BRANCH → tc-${HASH}"

      - name: Resolve target image path
        id: target
        run: |
          # Read imageRepo (and optional imageRegistry) from build-trigger.json when
          # present — lets teamcoder drive per-team / per-context ECR routing without
          # requiring a yaml edit per user repo.
          # Empty jq result = field absent → falls back to env defaults.
          TRIGGER_JSON=".teamcoder/build-trigger.json"
          REGISTRY=""
          REPO=""
          if [ -f "$TRIGGER_JSON" ]; then
            REGISTRY=$(jq -r '.imageRegistry // empty' "$TRIGGER_JSON" 2>/dev/null || true)
            REPO=$(jq -r '.imageRepo // empty' "$TRIGGER_JSON" 2>/dev/null || true)
          fi
          [ -z "$REGISTRY" ] && REGISTRY="${{ env.ECR_PUBLIC_REGISTRY }}"
          [ -z "$REPO" ] && REPO="${{ env.ECR_REPO }}"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "Target image path: $REGISTRY/$REPO"

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
          elif [ -f ".teamcoder/Dockerfile" ]; then
            echo "dockerfile=.teamcoder/Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "::error::No Dockerfile found. Add a Dockerfile to your repo."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::663099330265:role/teamcoder-ecr-push
          aws-region: us-east-1

      - name: Log in to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.detect.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.target.outputs.registry }}/${{ steps.target.outputs.repo }}:${{ steps.image.outputs.tag }}
            ${{ steps.target.outputs.registry }}/${{ steps.target.outputs.repo }}:${{ steps.image.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
